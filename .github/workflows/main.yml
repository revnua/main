# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
#
# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update exchange rates in _config.yml
        run: |
          CURRENT_USD=$(grep '^usd:' _config.yml | awk '{print $2}')
          CURRENT_EUR=$(grep '^eur:' _config.yml | awk '{print $2}')
          CURRENT_NBU=$(grep '^nbu:' _config.yml | awk '{print $2}')
          USD="" EUR="" NBU=""

          echo "Отримуємо офіційний курс НБУ..."
          NBU_DATA=$(curl -sf --max-time 10 "https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?json" || echo "")
          if [ -n "$NBU_DATA" ]; then
            NBU=$(echo "$NBU_DATA" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(round(r['rate'],4)) for r in data if r['cc']=='USD']" 2>/dev/null | head -1)
            echo "✅ НБУ офіційний: NBU=$NBU"
          else
            NBU="$CURRENT_NBU"
            echo "⚠️ НБУ недоступний, залишаємо NBU=$NBU"
          fi

          echo "Спроба PrivatBank (курс продажу)..."
          PRIVAT_DATA=$(curl -sf --max-time 10 "https://api.privatbank.ua/p24api/pubinfo?exchange&coursid=5" || echo "")
          if [ -n "$PRIVAT_DATA" ]; then
            USD=$(echo "$PRIVAT_DATA" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(round(float(r['sale']),2)) for r in data if r['ccy']=='USD']" 2>/dev/null | head -1)
            EUR=$(echo "$PRIVAT_DATA" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(round(float(r['sale']),2)) for r in data if r['ccy']=='EUR']" 2>/dev/null | head -1)
            echo "✅ PrivatBank: USD=$USD EUR=$EUR"
          fi

          if [ -z "$USD" ] || [ -z "$EUR" ]; then
            echo "PrivatBank недоступний. Спроба Monobank (курс продажу)..."
            MONO_DATA=$(curl -sf --max-time 10 "https://api.monobank.ua/bank/currency" || echo "")
            if [ -n "$MONO_DATA" ]; then
              USD=$(echo "$MONO_DATA" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(round(r.get('rateSell',r.get('rateCross',0)),2)) for r in data if r.get('currencyCodeA')==840 and r.get('currencyCodeB')==980]" 2>/dev/null | head -1)
              EUR=$(echo "$MONO_DATA" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(round(r.get('rateSell',r.get('rateCross',0)),2)) for r in data if r.get('currencyCodeA')==978 and r.get('currencyCodeB')==980]" 2>/dev/null | head -1)
              echo "✅ Monobank: USD=$USD EUR=$EUR"
            fi
          fi

          if [ -z "$USD" ] || [ -z "$EUR" ]; then
            echo "⚠️ PrivatBank і Monobank недоступні. Використовуємо НБУ для usd/eur..."
            if [ -n "$NBU_DATA" ]; then
              USD=$(echo "$NBU_DATA" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(round(r['rate'],2)) for r in data if r['cc']=='USD']" 2>/dev/null | head -1)
              EUR=$(echo "$NBU_DATA" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(round(r['rate'],2)) for r in data if r['cc']=='EUR']" 2>/dev/null | head -1)
              echo "✅ НБУ fallback: USD=$USD EUR=$EUR"
            fi
          fi

          if [ -z "$USD" ] || [ -z "$EUR" ]; then
            echo "⚠️ Всі API недоступні! Залишаємо поточні: USD=$CURRENT_USD EUR=$CURRENT_EUR"
            USD="$CURRENT_USD"
            EUR="$CURRENT_EUR"
          fi

          sed -i "s/^usd: .*/usd: $USD/" _config.yml
          sed -i "s/^eur: .*/eur: $EUR/" _config.yml
          sed -i "s/^nbu: .*/nbu: $NBU/" _config.yml
          echo "✅ _config.yml оновлено: USD=$USD EUR=$EUR NBU=$NBU"

      - name: Setup Ruby
        # https://github.com/ruby/setup-ruby/releases/tag/v1.207.0
        # uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      #- uses: actions/cache@v4
      #  with:
      #    path: vendor/bundle
      #    key: ${{ runner.os }}-jekyll-${{ hashFiles('**/Gemfile.lock') }}
      #    restore-keys: |
      #      ${{ runner.os }}-jekyll-
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v4

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
